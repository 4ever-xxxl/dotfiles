name: Dotfiles CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 快速静态检查：语法、shellcheck、dry-run
  # 失败立即退出，避免在 matrix 上浪费时间
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Bash syntax check
        run: bash -n install.sh

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck --severity=error install.sh

      - name: Dry-run install (no writes)
        run: ./install.sh --dry-run

  test-installation:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Setup environment (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh tmux curl git

      - name: Setup environment (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zsh tmux

      - name: Run Install Script
        run: ./install.sh install

      - name: Verify Symlinks
        run: |
          set -e
          missing=0
          check() {
            if [ ! -L "$HOME/$1" ]; then
              echo "❌ $1 not linked"
              missing=$((missing + 1))
            fi
          }

          # Shell
          check .zshrc
          check .zsh_plugins.txt
          check .config/fish

          # Terminal
          check .tmux.conf
          check .tmux/scripts
          check .config/alacritty

          # Editor
          check .vimrc
          check .config/nvim

          # Dev tools
          check .gitconfig
          check .gitconfig-personal
          check .gitconfig-work
          check .gdbinit
          check .clang-format
          # clangd 配置路径平台不同，CI 也按平台校验
          if [ "$RUNNER_OS" = "macOS" ]; then
            check Library/Preferences/clangd/config.yaml
          else
            check .config/clangd/config.yaml
          fi
          check .condarc

          # Env
          check .env
          check .env.local

          if [ "$missing" -gt 0 ]; then
            echo "$missing symlink(s) missing"
            exit 1
          fi
          echo "✓ All symlinks verified"

      - name: Run Uninstall
        run: ./install.sh uninstall

      - name: Verify Uninstall
        run: |
          set -e
          for f in .zshrc .zsh_plugins.txt .tmux.conf .tmux/scripts .vimrc .gitconfig \
                   .gdbinit .clang-format .condarc .env .env.local \
                   .config/nvim .config/alacritty .config/fish; do
            if [ -L "$HOME/$f" ]; then
              echo "❌ $f still linked after uninstall"
              exit 1
            fi
          done
          # clangd 路径平台不同
          if [ "$RUNNER_OS" = "macOS" ]; then
            clangd_path="Library/Preferences/clangd/config.yaml"
          else
            clangd_path=".config/clangd/config.yaml"
          fi
          if [ -L "$HOME/$clangd_path" ]; then
            echo "❌ $clangd_path still linked after uninstall"
            exit 1
          fi
          echo "✓ Uninstall verified"
