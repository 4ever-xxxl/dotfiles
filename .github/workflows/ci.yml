name: Dotfiles CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-installation:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v3

      - name: Setup environment (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh tmux curl git

      - name: Setup environment (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zsh tmux curl git

      - name: Run Install Script
        run: |
          ./install.sh install

      - name: Verify Symlinks
        run: |
          # Verify key files
          [ -L "$HOME/.zshrc" ] || (echo ".zshrc not linked" && exit 1)
          [ -L "$HOME/.gitconfig" ] || (echo ".gitconfig not linked" && exit 1)
          echo "Symlinks verified successfully!"

      - name: Run Uninstall
        run: |
          ./install.sh uninstall

      - name: Verify Uninstall
        run: |
          [ ! -L "$HOME/.zshrc" ] || (echo ".zshrc still linked" && exit 1)
          [ ! -L "$HOME/.gitconfig" ] || (echo ".gitconfig still linked" && exit 1)
          echo "Uninstall verified successfully!"
