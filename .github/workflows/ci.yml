name: Dotfiles CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 快速静态检查：语法、shellcheck、dry-run
  # 失败立即退出，避免在 matrix 上浪费时间
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Bash syntax check
        run: bash -n install.sh

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck --severity=error install.sh

      - name: Dry-run install (no writes)
        run: ./install.sh --dry-run

  test-installation:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Setup environment (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh tmux curl git

      - name: Setup environment (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zsh tmux

      - name: Run Install Script
        run: ./install.sh install

      - name: Verify Symlinks
        run: ./install.sh verify

      - name: Run Uninstall
        run: ./install.sh uninstall

      - name: Verify Uninstall
        run: |
          set -e
          rc=0
          while IFS= read -r p; do
            if [ -L "$p" ]; then
              echo "❌ still linked after uninstall: $p"
              rc=1
            fi
          done < <(./install.sh paths)
          if [ "$rc" -eq 0 ]; then
            echo "✓ Uninstall verified"
          fi
          exit $rc
