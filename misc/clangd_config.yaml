If:
  PathMatch: [.*\.cu, .*\.cuh]
CompileFlags:
  Add:
    - "-xcuda"
    - "--cuda-path=/usr/local/cuda"
    - "-I/usr/local/cuda/include"
    - "--cuda-gpu-arch=sm_100" 
    - "-nocudalib"
  Remove: 
    - "-forward-unknown-to-host-compiler"
    - "--generate-code=*"
    - "-Xcompiler=*"
    - "--extended-lambda"
    - "-rdc=*"
    - "-ccbin=*"
    - "-gencode=*"
    - "--expt-relaxed-constexpr"
    - "--expt-extended-lambda"
